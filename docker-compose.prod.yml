services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4100
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CORS_ORIGINS: ${PUBLIC_ORIGIN}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-4100}:4100"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "http=require('node:http');req=http.get('http://127.0.0.1:4100/health',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_API_BASE_URL: ${PUBLIC_ORIGIN}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      BACKEND_API_BASE_URL: http://backend:4100
      NEXT_PUBLIC_BACKEND_API_BASE_URL: ${PUBLIC_ORIGIN}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-3000}:3000"

volumes:
  pg_data:
