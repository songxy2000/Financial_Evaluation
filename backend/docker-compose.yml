services:
  postgres:
    image: postgres:16
    container_name: financial-ai-eval-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: financial_ai_eval
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:

